version: '3.8'

services:
  postgres:
    image: postgres:15        
    container_name: snowflake_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: snowflake     
      POSTGRES_PASSWORD: snowflake  
      POSTGRES_DB: snowflake_db          
    ports:
      - "5432:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data  

volumes:
  postgres_data: